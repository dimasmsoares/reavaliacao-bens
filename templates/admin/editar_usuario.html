{% extends 'base.html' %}
{% block title %}Editar Servidor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="d-flex align-items-center mb-3 gap-2">
      <a href="{{ url_for('admin_usuarios') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold">Alterar senha — {{ user.name }}</h5>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nova senha</label>
            <input type="text" name="password" class="form-control" required
                   minlength="4" placeholder="Mínimo 4 caracteres" autofocus>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-check-lg me-1"></i> Salvar
            </button>
            <a href="{{ url_for('admin_usuarios') }}" class="btn btn-outline-secondary">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
